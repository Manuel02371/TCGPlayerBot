name: TCGPlayer scraping

on:
  schedule:
    # GitHub cron usa UTC. 15:00 UTC = 10:00 a.m. Peru/Lima; 21:00 UTC = 4:00 p.m.
    - cron: "0 15,21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tcgplayer-scraping
  cancel-in-progress: false

jobs:
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run tests
        run: python -m unittest tests.test_basic_flow

      - name: Run scraping
        env:
          TCGPLAYER_HEADLESS: "true"
        run: python -m src.main

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tcgplayer-reports
          path: |
            data/output/scraping_historico.parquet
            data/reports/
            data/dashboard/
            data/logs/
          if-no-files-found: warn

      - name: Commit updated outputs
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/output/scraping_historico.parquet data/reports data/dashboard
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "chore: update tcgplayer scraping outputs"
            git push
          fi
